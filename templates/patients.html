{% extends "base.html" %}

{% block content %}

<h2>Patient Database</h2>

<div style="margin-bottom:15px;">

<a href="/add">
<button style="padding:8px 14px;">Add Patient</button>
</a>

<a href="/import">
<button style="padding:8px 14px;">Import Excel</button>
</a>

</div>
<table>

<tr>
<th>MRN</th>
<th>Patient Name</th>
<th>Background</th>
<th>Admission</th>
<th>Actions</th>
</tr>

{% for p in patients %}

<tr>

<td>{{p.mrn}}</td>
<td>{{p.name}}</td>
<td>{{p.background}}</td>
<td>{{p.admission}}</td>

<td>

<!-- EDIT -->
<a href="/edit/{{p.id}}">
<button>Edit</button>
</a>

<!-- DELETE -->
<a href="/delete/{{p.id}}" onclick="return confirm('Delete this patient?')">
<button class="dc">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
