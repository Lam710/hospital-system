<!DOCTYPE html>
<html>

<head>

<style>

body{
font-family:Arial;
background:#f5f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#273c75;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#192a56;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button>Login</button>

</form>

</div>

</body>
</html>
